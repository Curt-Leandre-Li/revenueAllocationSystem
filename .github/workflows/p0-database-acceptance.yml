name: P0 Database Acceptance

on:
  push:
    paths:
      - "db/**"
      - "scripts/db_smoke_test.py"
      - ".github/workflows/p0-database-acceptance.yml"
      - "Makefile"
  pull_request:
    paths:
      - "db/**"
      - "scripts/db_smoke_test.py"
      - ".github/workflows/p0-database-acceptance.yml"
      - "Makefile"
  workflow_dispatch:

jobs:
  p0-database-acceptance:
    name: p0-database-acceptance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dvas_p0
          POSTGRES_USER: dvas_app
          POSTGRES_PASSWORD: password
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U dvas_app -d dvas_p0"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dvas_app:password@localhost:5432/dvas_p0
      PGPASSWORD: password

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Show PostgreSQL version
        run: |
          psql "$DATABASE_URL" -c "SELECT version();"

      - name: Check database package checksums
        working-directory: db
        run: |
          sha256sum -c SHA256SUMS.txt

      - name: 00 create database roles
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f db/dvas_p0_00_create_database.sql

      - name: 01 create dvas schema
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f db/dvas_p0_01_schema.sql

      - name: 02 load seed data
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f db/dvas_p0_02_seed.sql

      - name: 03 load demo data
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f db/dvas_p0_03_demo_data.sql

      - name: 04 run validation SQL
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f db/dvas_p0_04_validation.sql | tee p0_validation.log
          grep -E "PASS|FAIL" p0_validation.log

      - name: Run database smoke test
        run: |
          python3 scripts/db_smoke_test.py | tee p0_smoke_test.log
          grep -E "PASS|FAIL" p0_smoke_test.log
