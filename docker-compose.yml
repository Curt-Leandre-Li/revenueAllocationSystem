services:
  postgres:
    image: postgres:16-alpine
    container_name: dvas-p0-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - dvas_p0_postgres_data:/var/lib/postgresql/data
      - ./db:/work/db:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  dvas_p0_postgres_data:
