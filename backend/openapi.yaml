openapi: 3.1.0
info:
  title: DVAS P0 Local API
  version: 0.7.0
  description: >
    BE-00 through BE-09 local demo API contract. Results are simulation
    references only and are not legal settlement, statutory settlement,
    payment instructions, contract performance, or authority approval.
servers:
  - url: http://127.0.0.1:8000/api/v1
paths:
  /auth/login:
    post:
      summary: Local development login
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /auth/logout:
    post:
      summary: Local development logout
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /auth/me:
    get:
      summary: Get current authenticated user and permissions
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /auth/permissions:
    get:
      summary: Get current permission summary
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /my/projects:
    get:
      summary: List projects visible to the current user
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /my/uploads:
    get:
      summary: List uploads visible to the current user
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /my/jobs:
    get:
      summary: List jobs visible to the current user
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /my/reports:
    get:
      summary: List reports visible to the current user
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /my/workbench:
    get:
      summary: Get current-user workbench summary
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /projects/current:
    get:
      summary: Get current P0 local project
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /navigation/menu-tree:
    get:
      summary: Get current navigation menu tree
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /navigation/button-permissions:
    get:
      summary: Get button-to-menu permission mapping
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard:
    get:
      summary: Get project status aggregation and next step
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard/preconditions:
    get:
      summary: Get backend-owned button preconditions and action state
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard/actions/quick-run:
    post:
      summary: Run the real P0 one-click calculation pipeline with a saved contract-ratio plan
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/jobs:
    post:
      summary: Start a local asynchronous complete-chain job
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
    get:
      summary: List local asynchronous jobs for a project
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /jobs/{job_id}:
    get:
      summary: Get a local asynchronous job detail
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /jobs/{job_id}/cancel:
    post:
      summary: Cancel a cancellable local asynchronous job
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/md-dshap/tasks:
    post:
      summary: Start an asynchronous MD-DShap task for a project
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/md-dshap/tasks/{task_id}/progress:
    get:
      summary: Get asynchronous MD-DShap task progress
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /import-templates/csv:
    get:
      summary: Download the CSV import template
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /import-templates/xlsx:
    get:
      summary: Download the XLSX import template
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/data-packages/import/csv:
    post:
      summary: Import a data package from the CSV template
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/data-packages/import/xlsx:
    post:
      summary: Import a data package from the XLSX template
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /demo-cases/{demo_case_id}/initialize:
    post:
      summary: Initialize a built-in demo data case
      parameters:
        - name: demo_case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /data-packages/upload:
    post:
      summary: Upload and validate JSON data package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPackageUploadRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /data-packages:
    get:
      summary: List data packages
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-packages/{package_id}:
    get:
      summary: Get data package detail
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-packages/{package_id}/validation-result:
    get:
      summary: Get upload validation result and failure details
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources:
    get:
      summary: List resources identified from current packages
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources/{resource_id}:
    get:
      summary: Get data resource detail
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources/{resource_id}/party-relations:
    put:
      summary: Bind data resource to source-party relations
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourcePartyRelationRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties:
    get:
      summary: List parties available after ingestion
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    post:
      summary: Create a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties/{party_id}:
    put:
      summary: Update a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties/{party_id}/status:
    patch:
      summary: Enable or disable a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyStatusRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/run:
    post:
      summary: Run BE-04 quality assessment skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QualityRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/latest:
    get:
      summary: Get latest quality assessment
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/{assessment_id}/details:
    get:
      summary: Get quality assessment details
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/{assessment_id}/resource-results:
    get:
      summary: Get resource-level quality results for an assessment
      description: >
        Returns package_score, package_level, assessed_resource_count,
        average_resource_score, low_score_resource_count, dimensions, resources,
        details, and heatmap. Each resource includes the backend-produced
        dimension_scores for the 7 primary metrics.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/run:
    post:
      summary: Run BE-05 shuyuan metering skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShuyuanMeteringRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/latest:
    get:
      summary: Get latest shuyuan metering result
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/{metering_id}/details:
    get:
      summary: Get shuyuan metering details
      parameters:
        - name: metering_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /contributions/run:
    post:
      summary: Run BE-05 contribution skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributionRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /utilities/run:
    post:
      summary: Run BE-05 utility skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UtilityRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /utilities/latest:
    get:
      summary: Get latest utility result
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /utilities/{utility_id}/trace:
    get:
      summary: Get utility calculation trace
      parameters:
        - name: utility_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks:
    post:
      summary: Run BE-06 P0 synchronous MD-DShap weight calculation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MdDshapTaskRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}:
    get:
      summary: Get MD-DShap task metadata
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}/results:
    get:
      summary: Get MD-DShap participant weight results
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}/marginal-traces:
    get:
      summary: Get MD-DShap marginal contribution trace rows
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /contract-constraints:
    get:
      summary: List P0 contract constraints
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    post:
      summary: Create a P0 contract constraint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /contract-constraints/{constraint_id}:
    put:
      summary: Update a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /contract-constraints/{constraint_id}/status:
    patch:
      summary: Enable or disable a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintStatusRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios:
    post:
      summary: Create a P0 allocation simulation scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocationScenarioCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/simulate:
    post:
      summary: Simulate allocation with active contract constraints
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/lock:
    post:
      summary: Lock a simulated reference allocation result
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/results:
    get:
      summary: Get allocation result history for a scenario
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/allocation/summary:
    get:
      summary: Get project-level contract-ratio allocation summary
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/allocation/simulate:
    post:
      summary: Simulate allocation from the saved project contract-ratio plan
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/allocation/contract-ratio:
    get:
      summary: Get the saved project contract-ratio plan
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
    put:
      summary: Save the project contract-ratio plan
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
    delete:
      summary: Clear the saved project contract-ratio plan
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports:
    get:
      summary: List generated P0 report and export records
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /reports/markdown:
    post:
      summary: Generate a P0 Markdown simulation reference report
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/csv:
    post:
      summary: Generate P0 CSV export files
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/json:
    post:
      summary: Generate a structured P0 JSON result export
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/audit-log:
    post:
      summary: Generate P0 audit log JSONL export
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/md-dshap-audit:
    post:
      summary: Generate MD-DShap algorithm audit report
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/reports/pdf:
    post:
      summary: Generate a local P1 PDF report artifact
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/reports:
    get:
      summary: List project report history records
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "401":
          $ref: "#/components/responses/StandardError"
  /reports/{report_id}:
    get:
      summary: Get report history detail
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports/{report_id}/files:
    get:
      summary: List files associated with a report
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports/{report_id}/manifest:
    get:
      summary: Get report export manifest
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports/{report_id}/download:
    get:
      summary: Download a report or report file as base64 content
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports/{report_id}/archive:
    patch:
      summary: Archive a report history record
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /system/parameters:
    get:
      summary: List P0 system parameters
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /system/parameters/{parameter_code}:
    get:
      summary: Get a P0 system parameter
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
    put:
      summary: Update an editable P0 system parameter
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemParameterUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /system/parameters/{parameter_code}/restore-default:
    post:
      summary: Restore an editable P0 system parameter to its default value
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /system/users:
    get:
      summary: List local P1 user accounts without password fields
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "403":
          $ref: "#/components/responses/StandardError"
    post:
      summary: Create a local P1 user account and return one-time initial password only in this response
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "403":
          $ref: "#/components/responses/StandardError"
