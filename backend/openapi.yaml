openapi: 3.1.0
info:
  title: DVAS P0 Local API
  version: 0.5.0
  description: >
    BE-00 through BE-07 local demo API contract. Results are simulation
    references only and are not legal settlement, statutory settlement,
    payment instructions, contract performance, or authority approval.
servers:
  - url: http://127.0.0.1:8000/api/v1
paths:
  /projects/current:
    get:
      summary: Get current P0 local project
      responses:
        "200":
          description: Standard response envelope containing AllocationProject.
  /dashboard/overview:
    get:
      summary: Get project status aggregation and next step
      responses:
        "200":
          description: Dashboard overview with metrics, risk notices, preconditions, and actions.
  /dashboard/preconditions:
    get:
      summary: Get backend-owned button preconditions and action state
      responses:
        "200":
          description: Preconditions plus available_actions and disabled_actions.
  /dashboard/quick-run:
    post:
      summary: One-click calculation entry skeleton
      responses:
        "200":
          description: Ready response when BE-04+ preconditions are satisfied.
        "409":
          description: Structured precondition failure.
  /demo-cases/{demo_case_id}/initialize:
    post:
      summary: Initialize a built-in demo data case
      parameters:
        - name: demo_case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Created data package, input snapshot, resources, parties, and audit log.
        "404":
          description: Demo case not found.
  /data-packages/upload:
    post:
      summary: Upload and validate JSON data package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPackageUploadRequest"
      responses:
        "200":
          description: Created validated package, input snapshot, resources, and parties.
        "422":
          description: Validation failure with field_errors and failure detail.
  /data-packages:
    get:
      summary: List data packages
      responses:
        "200":
          description: Paged package list.
  /data-packages/{package_id}:
    get:
      summary: Get data package detail
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package, input snapshot, validation result, and resources.
  /data-packages/{package_id}/validation-result:
    get:
      summary: Get upload validation result and failure details
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: UploadValidationResult.
  /data-resources:
    get:
      summary: List resources identified from current packages
      responses:
        "200":
          description: Paged data resource list.
  /data-resources/{resource_id}:
    get:
      summary: Get data resource detail
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DataResource.
  /data-resources/{resource_id}/party-relations:
    put:
      summary: Bind data resource to source-party relations
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourcePartyRelationRequest"
      responses:
        "200":
          description: Updated DataResource with party_relations.
        "404":
          description: Resource or party not found.
        "422":
          description: Invalid split ratio or missing relation fields.
  /parties:
    get:
      summary: List parties available after ingestion
      responses:
        "200":
          description: Paged party list.
    post:
      summary: Create a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          description: Created Party.
        "422":
          description: Missing or invalid party fields.
  /parties/{party_id}:
    put:
      summary: Update a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          description: Updated Party.
        "404":
          description: Party not found.
        "422":
          description: Duplicate or invalid party fields.
  /parties/{party_id}/status:
    patch:
      summary: Enable or disable a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyStatusRequest"
      responses:
        "200":
          description: Updated Party status.
        "409":
          description: Cannot disable the only enabled data provider.
  /quality-assessments/run:
    post:
      summary: Run BE-04 quality assessment skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QualityRunRequest"
      responses:
        "200":
          description: Quality assessment, detail rows, result snapshot, and project status update.
        "409":
          description: Data ingestion precondition not satisfied.
  /quality-assessments/latest:
    get:
      summary: Get latest quality assessment
      responses:
        "200":
          description: Latest QualityAssessment.
        "404":
          description: No quality assessment exists.
  /quality-assessments/{assessment_id}/details:
    get:
      summary: Get quality assessment details
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QualityAssessment plus detail rows.
        "404":
          description: Quality assessment not found.
  /shuyuan-meterings/run:
    post:
      summary: Run BE-05 shuyuan metering skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShuyuanMeteringRunRequest"
      responses:
        "200":
          description: Shuyuan metering master row, detail rows, snapshots, and project status update.
        "409":
          description: Quality assessment precondition not satisfied.
  /shuyuan-meterings/latest:
    get:
      summary: Get latest shuyuan metering result
      responses:
        "200":
          description: Latest ShuyuanMetering.
        "404":
          description: No shuyuan metering exists.
  /shuyuan-meterings/{metering_id}/details:
    get:
      summary: Get shuyuan metering details
      parameters:
        - name: metering_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ShuyuanMetering plus detail rows.
        "404":
          description: Shuyuan metering not found.
  /contributions/run:
    post:
      summary: Run BE-05 contribution skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributionRunRequest"
      responses:
        "200":
          description: Contribution records and parameter/result snapshots.
        "409":
          description: Shuyuan metering precondition not satisfied.
  /utilities/run:
    post:
      summary: Run BE-05 utility skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UtilityRunRequest"
      responses:
        "200":
          description: Utility result, trace rows, snapshots, and project status update.
        "409":
          description: Contribution precondition not satisfied.
  /utilities/latest:
    get:
      summary: Get latest utility result
      responses:
        "200":
          description: Latest UtilityRecord.
        "404":
          description: No utility result exists.
  /utilities/{utility_id}/trace:
    get:
      summary: Get utility calculation trace
      parameters:
        - name: utility_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: UtilityRecord plus trace rows.
        "404":
          description: Utility result not found.
  /md-dshap/tasks:
    post:
      summary: Run BE-06 P0 synchronous MD-DShap weight calculation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MdDshapTaskRunRequest"
      responses:
        "200":
          description: MD-DShap task, result count, approximation note, weights, and project status.
        "409":
          description: Utility, participant, or positive-utility precondition not satisfied.
  /md-dshap/tasks/{task_id}:
    get:
      summary: Get MD-DShap task metadata
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task metadata with participant_set, task_set, parameters, status, and snapshots.
        "404":
          description: MD-DShap task not found.
  /md-dshap/tasks/{task_id}/results:
    get:
      summary: Get MD-DShap participant weight results
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paged participant weights. Normalized weights sum to 1.000000.
        "404":
          description: MD-DShap task not found.
  /md-dshap/tasks/{task_id}/marginal-traces:
    get:
      summary: Get MD-DShap marginal contribution trace rows
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paged marginal trace rows for the task.
        "404":
          description: MD-DShap task not found.
  /contract-constraints:
    get:
      summary: List P0 contract constraints
      responses:
        "200":
          description: Paged contract constraint list.
    post:
      summary: Create a P0 contract constraint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          description: Created contract constraint.
        "404":
          description: Party not found.
        "422":
          description: Invalid amount, ratio, status, or constraint type.
  /contract-constraints/{constraint_id}:
    put:
      summary: Update a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          description: Updated contract constraint with incremented version_no.
        "404":
          description: Constraint or party not found.
        "422":
          description: Invalid amount, ratio, status, or constraint type.
  /contract-constraints/{constraint_id}/status:
    patch:
      summary: Enable or disable a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintStatusRequest"
      responses:
        "200":
          description: Updated contract constraint status with incremented version_no.
        "404":
          description: Constraint not found.
        "422":
          description: Invalid status.
  /allocation-scenarios:
    post:
      summary: Create a P0 allocation simulation scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocationScenarioCreateRequest"
      responses:
        "200":
          description: Created allocation scenario in DRAFT status.
        "409":
          description: Missing MD-DShap result or invalid revenue pool precondition.
  /allocation-scenarios/{allocation_id}/simulate:
    post:
      summary: Simulate allocation with active contract constraints
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Allocation scenario, result rows, constraint trace rows, and project status.
        "404":
          description: Allocation scenario not found.
        "409":
          description: Weight or constraint precondition not satisfied.
  /allocation-scenarios/{allocation_id}/lock:
    post:
      summary: Lock a simulated reference allocation result
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Confirmed simulation reference. Does not create legal settlement or payment instructions.
        "404":
          description: Allocation scenario not found.
        "409":
          description: Allocation scenario is not in ALLOCATED status.
  /allocation-scenarios/{allocation_id}/results:
    get:
      summary: Get allocation result history for a scenario
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paged allocation result rows across simulation versions.
        "404":
          description: Allocation scenario not found.
components:
  schemas:
    StandardResponse:
      type: object
      required: [success, code, message, trace_id, data]
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
        data:
          type: object
    ErrorResponse:
      type: object
      required: [success, code, message, trace_id, field_errors]
      properties:
        success:
          const: false
        code:
          type: string
          enum:
            - DVAS_INPUT_FORMAT_ERROR
            - DVAS_REQUIRED_FIELD_MISSING
            - DVAS_PRECONDITION_NOT_MET
            - DVAS_FACTOR_INVALID
            - DVAS_NOT_FOUND
        message:
          type: string
        trace_id:
          type: string
        field_errors:
          type: array
          items:
            type: object
            required: [field, reason]
            properties:
              field:
                type: string
              reason:
                type: string
    DataPackageUploadRequest:
      type: object
      required: [package_name, resources, parties]
      properties:
        package_name:
          type: string
        file_name:
          type: string
        resources:
          type: array
          items:
            type: object
            required: [resource_name, provider_party_name]
            properties:
              resource_name:
                type: string
              modality:
                type: string
              field_count:
                type: integer
              sample_count:
                type: integer
              provider_party_name:
                type: string
        parties:
          type: array
          items:
            type: object
            required: [party_name]
            properties:
              party_name:
                type: string
              party_type:
                type: string
              include_in_md_dshap:
                type: boolean
    ResourcePartyRelationRequest:
      type: object
      required: [relations]
      properties:
        relations:
          type: array
          items:
            type: object
            required: [party_id]
            properties:
              party_id:
                type: string
              split_ratio:
                type: number
                minimum: 0
                maximum: 1
              is_primary_provider:
                type: boolean
    PartyWriteRequest:
      type: object
      required: [party_name]
      properties:
        party_name:
          type: string
        party_type:
          type: string
        include_in_md_dshap:
          type: boolean
        credit_code:
          type: string
        contact_name:
          type: string
        description:
          type: string
    PartyStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ENABLED, DISABLED]
        reason:
          type: string
    QualityRunRequest:
      type: object
      properties:
        package_id:
          type: string
    ShuyuanMeteringRunRequest:
      type: object
      properties:
        base_price:
          type: number
        scenario_coefficient:
          type: number
        quality_coefficient:
          type: number
        technology_coefficient:
          type: number
        expert_coefficient:
          type: number
        development_coefficient:
          type: number
        call_count:
          type: integer
    ContributionRunRequest:
      type: object
      properties:
        usage_weight:
          type: number
        coverage_weight:
          type: number
        scarcity_weight:
          type: number
    UtilityRunRequest:
      type: object
      properties:
        quality_factor:
          type: number
        usage_factor:
          type: number
        scenario_factor:
          type: number
    MdDshapTaskRunRequest:
      type: object
      properties:
        algorithm_mode:
          type: string
          default: MD_DSHAP
        seed:
          type: integer
          default: 42
        sample_rounds:
          type: integer
          default: 64
        epsilon:
          type: number
          default: 0.000001
        baseline_enabled:
          type: boolean
          description: Defaults to true when participant_count is 8 or below.
        save_marginal_detail:
          type: boolean
          default: true
    ContractConstraintWriteRequest:
      type: object
      required: [party_id, constraint_type, constraint_value]
      properties:
        party_id:
          type: string
        constraint_name:
          type: string
        constraint_type:
          type: string
          enum: [MIN_AMOUNT, MAX_AMOUNT, CAP_AMOUNT, FLOOR_AMOUNT, FIXED_RATIO, PRIORITY_ALLOCATION]
        value_type:
          type: string
          enum: [AMOUNT, RATIO]
        constraint_value:
          type: number
        priority:
          type: integer
          default: 100
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        description:
          type: string
    ContractConstraintStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        description:
          type: string
    AllocationScenarioCreateRequest:
      type: object
      required: [total_revenue]
      properties:
        total_revenue:
          type: number
          minimum: 0
        currency:
          type: string
          default: CNY
        priority_allocation_amount:
          type: number
          minimum: 0
          default: 0
        allocation_mode:
          type: string
          default: MD_DSHAP_WEIGHT_WITH_CONSTRAINTS
        weight_task_id:
          type: string
