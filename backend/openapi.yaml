openapi: 3.1.0
info:
  title: DVAS P0 Local API
  version: 0.7.0
  description: >
    BE-00 through BE-09 local demo API contract. Results are simulation
    references only and are not legal settlement, statutory settlement,
    payment instructions, contract performance, or authority approval.
servers:
  - url: http://127.0.0.1:8000/api/v1
paths:
  /projects/current:
    get:
      summary: Get current P0 local project
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /navigation/menu-tree:
    get:
      summary: Get current navigation menu tree
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /navigation/button-permissions:
    get:
      summary: Get button-to-menu permission mapping
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard:
    get:
      summary: Get project status aggregation and next step
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard/preconditions:
    get:
      summary: Get backend-owned button preconditions and action state
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /dashboard/actions/quick-run:
    post:
      summary: Run the real P0 one-click calculation pipeline
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /demo-cases/{demo_case_id}/initialize:
    post:
      summary: Initialize a built-in demo data case
      parameters:
        - name: demo_case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /data-packages/upload:
    post:
      summary: Upload and validate JSON data package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPackageUploadRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /data-packages:
    get:
      summary: List data packages
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-packages/{package_id}:
    get:
      summary: Get data package detail
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-packages/{package_id}/validation-result:
    get:
      summary: Get upload validation result and failure details
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources:
    get:
      summary: List resources identified from current packages
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources/{resource_id}:
    get:
      summary: Get data resource detail
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data-resources/{resource_id}/party-relations:
    put:
      summary: Bind data resource to source-party relations
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourcePartyRelationRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties:
    get:
      summary: List parties available after ingestion
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    post:
      summary: Create a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties/{party_id}:
    put:
      summary: Update a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /parties/{party_id}/status:
    patch:
      summary: Enable or disable a participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyStatusRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/run:
    post:
      summary: Run BE-04 quality assessment skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QualityRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/latest:
    get:
      summary: Get latest quality assessment
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /quality-assessments/{assessment_id}/details:
    get:
      summary: Get quality assessment details
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/run:
    post:
      summary: Run BE-05 shuyuan metering skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShuyuanMeteringRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/latest:
    get:
      summary: Get latest shuyuan metering result
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /shuyuan-meterings/{metering_id}/details:
    get:
      summary: Get shuyuan metering details
      parameters:
        - name: metering_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /contributions/run:
    post:
      summary: Run BE-05 contribution skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributionRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /utilities/run:
    post:
      summary: Run BE-05 utility skeleton
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UtilityRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /utilities/latest:
    get:
      summary: Get latest utility result
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /utilities/{utility_id}/trace:
    get:
      summary: Get utility calculation trace
      parameters:
        - name: utility_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks:
    post:
      summary: Run BE-06 P0 synchronous MD-DShap weight calculation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MdDshapTaskRunRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}:
    get:
      summary: Get MD-DShap task metadata
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}/results:
    get:
      summary: Get MD-DShap participant weight results
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /md-dshap/tasks/{task_id}/marginal-traces:
    get:
      summary: Get MD-DShap marginal contribution trace rows
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /contract-constraints:
    get:
      summary: List P0 contract constraints
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    post:
      summary: Create a P0 contract constraint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /contract-constraints/{constraint_id}:
    put:
      summary: Update a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintWriteRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /contract-constraints/{constraint_id}/status:
    patch:
      summary: Enable or disable a P0 contract constraint
      parameters:
        - name: constraint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractConstraintStatusRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios:
    post:
      summary: Create a P0 allocation simulation scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocationScenarioCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/simulate:
    post:
      summary: Simulate allocation with active contract constraints
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/lock:
    post:
      summary: Lock a simulated reference allocation result
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "409":
          $ref: "#/components/responses/StandardError"
  /allocation-scenarios/{allocation_id}/results:
    get:
      summary: Get allocation result history for a scenario
      parameters:
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /reports:
    get:
      summary: List generated P0 report and export records
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /reports/markdown:
    post:
      summary: Generate a P0 Markdown simulation reference report
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/csv:
    post:
      summary: Generate P0 CSV export files
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/json:
    post:
      summary: Generate a structured P0 JSON result export
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/audit-log:
    post:
      summary: Generate P0 audit log JSONL export
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /reports/md-dshap-audit:
    post:
      summary: Generate MD-DShap algorithm audit report
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /system/parameters:
    get:
      summary: List P0 system parameters
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /system/parameters/{parameter_code}:
    get:
      summary: Get a P0 system parameter
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
    put:
      summary: Update an editable P0 system parameter
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemParameterUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /system/parameters/{parameter_code}/restore-default:
    post:
      summary: Restore an editable P0 system parameter to its default value
      parameters:
        - name: parameter_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
        "422":
          $ref: "#/components/responses/StandardError"
  /audit-logs:
    get:
      summary: Query P0 audit logs
      parameters:
        - name: module_code
          in: query
          schema:
            type: string
        - name: operation_type
          in: query
          schema:
            type: string
        - name: object_type
          in: query
          schema:
            type: string
        - name: object_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /audit-logs/{log_id}:
    get:
      summary: Get P0 audit log detail with related snapshots when available
      parameters:
        - name: log_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /navigation/menus:
    get:
      summary: Phase 2C navigation alias
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /projects/current/status:
    get:
      summary: Get current project status and flow preconditions
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /projects/{project_id}/status:
    get:
      summary: Get project status by project id
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /projects/{project_id}/flow:
    get:
      summary: Get project flow preconditions by project id
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /projects/{project_id}/pipeline/run:
    post:
      summary: Run real P0 complete calculation pipeline
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "409":
          $ref: "#/components/responses/StandardError"
  /sys/home:
    get:
      summary: System home aggregate
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /demo-cases/{demo_case_id}/select:
    post:
      summary: Select built-in demo data and advance DRAFT to INGESTED
      parameters:
        - name: demo_case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/packages:
    get:
      summary: Phase 2C data package list alias
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/packages/upload:
    post:
      summary: Phase 2C JSON upload endpoint
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "422":
          $ref: "#/components/responses/StandardError"
  /data/packages/{package_id}/preview:
    get:
      summary: Preview data package content
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/resources:
    get:
      summary: Phase 2C data resources endpoint
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/parties:
    get:
      summary: Phase 2C participant list endpoint
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    post:
      summary: Create participant
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/parties/{party_id}:
    patch:
      summary: Update participant
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /data/parties/{party_id}/status:
    patch:
      summary: Update participant status
      parameters:
        - name: party_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/quality/weights:
    get:
      summary: Read P0 quality weights
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    put:
      summary: Save P0 quality weights
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/quality/evaluate:
    post:
      summary: Run quality assessment
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/shuyuan/parameters:
    put:
      summary: Save shuyuan parameter draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/shuyuan/call-counts:
    put:
      summary: Save shuyuan call counts
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/shuyuan/calculate:
    post:
      summary: Run shuyuan metering
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/utility/contribution-factors:
    put:
      summary: Save contribution factor draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/utility/contribution/calculate:
    post:
      summary: Calculate contribution records
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/utility/function:
    put:
      summary: Save utility function draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /metering/utility/calculate:
    post:
      summary: Calculate utility values
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/config:
    get:
      summary: Read MD-DShap default config
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
    put:
      summary: Save MD-DShap config draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/participant-pool:
    get:
      summary: Read MD-DShap participant pool
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/tasks:
    post:
      summary: Run MD-DShap task
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/tasks/{task_id}:
    get:
      summary: Get MD-DShap task by id
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/tasks/{task_id}/results:
    get:
      summary: Get MD-DShap task weights
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/md-dshap/tasks/{task_id}/audit-export:
    post:
      summary: Export MD-DShap algorithm audit report for a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
        "404":
          $ref: "#/components/responses/StandardError"
  /allocation/simulation/revenue-pool:
    put:
      summary: Save revenue pool draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/simulation/priority-items:
    put:
      summary: Save priority allocation draft
      responses:
        "200":
          $ref: "#/components/responses/StandardSuccess"
  /allocation/simulation/mode:
    put:
      summary: Save allocation mode draft
      responses:
        "200":
