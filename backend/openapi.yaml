components:
  responses:
    StandardSuccess:
      description: Standard DVAS success envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardError:
      description: Standard DVAS error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    StandardResponse:
      type: object
      required: [success, code, message, trace_id, data]
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
        data:
          type: object
        project_status:
          type: string
          description: Present on responses that mutate or expose project state.
    ErrorResponse:
      type: object
      required: [success, code, message, trace_id, field_errors, error]
      properties:
        success:
          const: false
        code:
          type: string
          enum:
            - DVAS_INPUT_FORMAT_ERROR
            - DVAS_REQUIRED_FIELD_MISSING
            - DVAS_PRECONDITION_NOT_MET
            - DVAS_FACTOR_INVALID
            - DVAS_NOT_FOUND
        message:
          type: string
        trace_id:
          type: string
        disabled_reason:
          type: string
        field_errors:
          type: array
          items:
            type: object
            required: [field, reason]
            properties:
              field:
                type: string
              reason:
                type: string
        error:
          type: object
          required: [code, message, detail]
          properties:
            code:
              type: string
            field:
              type: string
              nullable: true
            message:
              type: string
            detail:
              type: object
    DataPackageUploadRequest:
      type: object
      required: [package_name, resources, parties]
      properties:
        package_name:
          type: string
        file_name:
          type: string
        resources:
          type: array
          items:
            type: object
            required: [resource_name, provider_party_name]
            properties:
              resource_name:
                type: string
              modality:
                type: string
              field_count:
                type: integer
              sample_count:
                type: integer
              provider_party_name:
                type: string
        parties:
          type: array
          items:
            type: object
            required: [party_name]
            properties:
              party_name:
                type: string
              party_type:
                type: string
              include_in_md_dshap:
                type: boolean
    ResourcePartyRelationRequest:
      type: object
      required: [relations]
      properties:
        relations:
          type: array
          items:
            type: object
            required: [party_id]
            properties:
              party_id:
                type: string
              split_ratio:
                type: number
                minimum: 0
                maximum: 1
              is_primary_provider:
                type: boolean
    PartyWriteRequest:
      type: object
      required: [party_name]
      properties:
        party_name:
          type: string
        party_type:
          type: string
        include_in_md_dshap:
          type: boolean
        credit_code:
          type: string
        contact_name:
          type: string
        description:
          type: string
    PartyStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ENABLED, DISABLED]
        reason:
          type: string
    QualityRunRequest:
      type: object
      properties:
        package_id:
          type: string
    ShuyuanMeteringRunRequest:
      type: object
      properties:
        base_price:
          type: number
        scenario_coefficient:
          type: number
        quality_coefficient:
          type: number
        technology_coefficient:
          type: number
        expert_coefficient:
          type: number
        development_coefficient:
          type: number
        call_count:
          type: integer
    ContributionRunRequest:
      type: object
      properties:
        usage_weight:
          type: number
        coverage_weight:
          type: number
        scarcity_weight:
          type: number
    UtilityRunRequest:
      type: object
      properties:
        quality_factor:
          type: number
        usage_factor:
          type: number
        scenario_factor:
          type: number
    MdDshapTaskRunRequest:
      type: object
      properties:
        algorithm_mode:
          type: string
          default: MD_DSHAP
        seed:
          type: integer
          default: 42
        sample_rounds:
          type: integer
          default: 64
        epsilon:
          type: number
          default: 0.000001
        baseline_enabled:
          type: boolean
          description: Defaults to true when participant_count is 8 or below.
        save_marginal_detail:
          type: boolean
          default: true
    ContractConstraintWriteRequest:
      type: object
      required: [party_id, constraint_type, constraint_value]
      properties:
        party_id:
          type: string
        constraint_name:
          type: string
        constraint_type:
          type: string
          enum: [MIN_AMOUNT, MAX_AMOUNT, CAP_AMOUNT, FLOOR_AMOUNT, FIXED_RATIO, PRIORITY_ALLOCATION]
        value_type:
          type: string
          enum: [AMOUNT, RATIO]
        constraint_value:
          type: number
        priority:
          type: integer
          default: 100
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        description:
          type: string
    ContractConstraintStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        description:
          type: string
    AllocationScenarioCreateRequest:
      type: object
      required: [total_revenue]
      properties:
        total_revenue:
          type: number
          minimum: 0
        currency:
          type: string
          default: CNY
        priority_allocation_amount:
          type: number
          minimum: 0
          default: 0
        allocation_mode:
          type: string
          default: MD_DSHAP_WEIGHT_WITH_CONSTRAINTS
        weight_task_id:
          type: string
    SystemParameterUpdateRequest:
      type: object
      required: [current_value]
      properties:
        current_value:
          oneOf:
            - type: string
            - type: number
            - type: integer
